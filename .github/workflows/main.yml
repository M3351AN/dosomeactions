name: Download Pixel2 Factory Image

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download file
        run: |
          curl -L -o walleye-factory.zip --retry 5 --retry-delay 10 \
            "https://dl.google.com/dl/android/aosp/walleye-opd1.170816.010-factory-63083164.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixel2-factory
          path: walleye-factory.zip
